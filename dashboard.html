<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amplitude × Minders — Co-Reach NOLA 2026</title>
<style>
:root {
  --bg: #0d0f1a;
  --surface: #141622;
  --surface2: #1c1f30;
  --surface3: #22263a;
  --border: #282d46;
  --accent: #6c63ff;
  --amp: #00c4a7;
  --warn: #f5a623;
  --danger: #e74c3c;
  --success: #2ecc71;
  --text: #e8eaf6;
  --muted: #6b7194;
  --muted2: #8b92b8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

/* ─── HEADER ─── */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky; top: 0; z-index: 100;
}
.logo { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; display: flex; align-items: center; gap: 10px; }
.logo-amp { color: var(--amp); }
.logo-x { color: var(--muted); margin: 0 2px; }
.logo-min { color: var(--accent); }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.btn { padding: 7px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
.btn-ghost { background: transparent; color: var(--muted2); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #574fdb; }
.btn-amp { background: var(--amp); color: #0d1a17; }
.date-chip { font-size: 11px; color: var(--muted); background: var(--surface2); padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); }

/* ─── STATS ─── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  border-bottom: 1px solid var(--border);
}
.stat { padding: 18px 20px; border-right: 1px solid var(--border); text-align: center; }
.stat:last-child { border-right: none; }
.stat-val { font-size: 26px; font-weight: 800; }
.stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-top: 3px; }
.c-acc { color: var(--accent); }
.c-amp { color: var(--amp); }
.c-warn { color: var(--warn); }
.c-ok { color: var(--success); }
.c-danger { color: var(--danger); }

/* ─── LAYOUT ─── */
.main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }

/* ─── FILTERS ─── */
.filters-bar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  margin-bottom: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
}
.filter-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
.filter-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; white-space: nowrap; }
.fbtn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted2); font-size: 12px; cursor: pointer; transition: all 0.12s; white-space: nowrap; }
.fbtn:hover { border-color: var(--accent); color: var(--accent); }
.fbtn.on { background: var(--accent); border-color: var(--accent); color: white; }
.fbtn.on-amp { background: var(--amp); border-color: var(--amp); color: #0d1a17; }

/* ─── ACCOUNT CARD ─── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 10px; overflow: hidden; transition: border-color 0.15s; }
.card:hover { border-color: #3a3f5e; }
.card.open { border-color: var(--accent); }

.card-header {
  display: grid;
  grid-template-columns: 1fr auto auto;
  align-items: center;
  padding: 16px 20px;
  gap: 16px;
  cursor: pointer;
  user-select: none;
}
.card-name { font-size: 15px; font-weight: 700; margin-bottom: 5px; }
.card-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; letter-spacing: 0.2px; }
.tag-banco     { background: rgba(108,99,255,.15); color: #a89dff; }
.tag-fintech   { background: rgba(0,196,167,.15);  color: #00c4a7; }
.tag-loyalty   { background: rgba(245,166,35,.15); color: #f5a623; }
.tag-aerolinea { background: rgba(52,152,219,.15); color: #5dade2; }
.tag-retail    { background: rgba(231,76,60,.15);  color: #f1948a; }
.tag-tier { background: rgba(255,255,255,.06); color: var(--muted2); }
.tag-braze { background: rgba(231,76,60,.15); color: #f1948a; }
.tag-t1 { background: rgba(108,99,255,.2); color: #c4bfff; }
.tag-t2 { background: rgba(0,196,167,.15); color: #00c4a7; }

.team-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.pill {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px 4px 6px;
  border-radius: 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  font-size: 11px;
  white-space: nowrap;
}
.pill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.pill-role { color: var(--muted); font-size: 10px; margin-right: 2px; }

.chevron { color: var(--muted); font-size: 16px; transition: transform 0.2s; flex-shrink: 0; }
.card.open .chevron { transform: rotate(180deg); }

/* ─── CARD BODY ─── */
.card-body { display: none; border-top: 1px solid var(--border); }
.card.open .card-body { display: block; }

.body-grid { display: grid; grid-template-columns: 1fr 380px; gap: 0; }

/* Left: strategy */
.strategy-col { padding: 24px; border-right: 1px solid var(--border); }
.section-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; font-weight: 600; }

.dossier-block { margin-bottom: 20px; }
.dossier-block:last-child { margin-bottom: 0; }

.qual-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
.qual-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
.qual-key { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.qual-val { font-size: 12px; font-weight: 500; line-height: 1.4; }

.market-text { font-size: 12px; color: var(--muted2); line-height: 1.7; }
.market-text p { margin-bottom: 10px; }
.market-text p:last-child { margin-bottom: 0; }

.approach-item { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
.approach-num { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: white; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
.approach-text { font-size: 12px; color: var(--muted2); line-height: 1.6; }
.approach-text strong { color: var(--text); }

.asset-box { background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; }
.asset-name { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
.asset-why { font-size: 11px; color: var(--muted2); line-height: 1.5; }

.warning-box { background: rgba(231,76,60,.08); border: 1px solid rgba(231,76,60,.3); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #f1948a; margin-top: 12px; }

/* Right: cadence */
.cadence-col { padding: 24px; display: flex; flex-direction: column; gap: 16px; }

.step-card {
  border-radius: 10px;
  padding: 14px;
  border: 1px solid transparent;
  position: relative;
}
.step-d1  { background: rgba(108,99,255,.08); border-color: rgba(108,99,255,.25); }
.step-d4  { background: rgba(0,196,167,.08);  border-color: rgba(0,196,167,.25); }
.step-d8  { background: rgba(245,166,35,.08); border-color: rgba(245,166,35,.25); }
.step-d14 { background: rgba(231,76,60,.08);  border-color: rgba(231,76,60,.25); }

.step-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.step-day-label { font-size: 18px; font-weight: 800; }
.step-d1  .step-day-label { color: #9d96ff; }
.step-d4  .step-day-label { color: #00c4a7; }
.step-d8  .step-day-label { color: #f5a623; }
.step-d14 .step-day-label { color: #e74c3c; }

.step-date { font-size: 11px; color: var(--muted); }
.step-desc { font-size: 11px; color: var(--muted2); line-height: 1.5; margin-bottom: 8px; }
.step-owners { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
.avatar { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 800; color: white; flex-shrink: 0; cursor: default; }
.avatar-add { width: 22px; height: 22px; border-radius: 50%; border: 1px dashed var(--muted); display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--muted); cursor: pointer; flex-shrink: 0; line-height: 1; }
.avatar-add:hover { border-color: var(--accent); color: var(--accent); }
.step-channel { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; color: var(--muted); background: rgba(255,255,255,.05); border-radius: 4px; padding: 2px 6px; margin-bottom: 6px; cursor: pointer; }
.step-channel:hover { background: rgba(255,255,255,.1); }
.step-message { font-size: 10px; color: var(--muted); background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; margin-bottom: 6px; font-style: italic; line-height: 1.4; cursor: pointer; }
.step-message:hover { border-color: var(--muted); }
/* Owner picker popup */
.owner-picker { position: absolute; bottom: 40px; left: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px; z-index: 100; display: flex; flex-wrap: wrap; gap: 6px; min-width: 160px; box-shadow: 0 4px 16px rgba(0,0,0,.4); }
.owner-picker-item { display: flex; align-items: center; gap: 5px; font-size: 11px; cursor: pointer; padding: 3px 6px; border-radius: 4px; white-space: nowrap; }
.owner-picker-item:hover { background: rgba(255,255,255,.08); }
.owner-picker-item.active { background: rgba(124,77,255,.2); }
.step-status-dot {
  position: absolute; top: 10px; right: 10px;
  width: 10px; height: 10px; border-radius: 50%;
  cursor: pointer; transition: transform 0.1s;
}
.step-status-dot:hover { transform: scale(1.3); }
.s-pending { background: var(--border); }
.s-today { background: var(--warn); animation: blink 1.5s infinite; }
.s-sent { background: var(--success); }
.s-overdue { background: var(--danger); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Personas */
.personas-row { display: flex; gap: 8px; flex-wrap: wrap; padding: 16px 24px; border-top: 1px solid var(--border); background: var(--surface2); }
.persona-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; min-width: 160px; }
.persona-role-lbl { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
.persona-name-field { font-size: 12px; font-weight: 600; color: var(--text); outline: none; border: none; background: transparent; width: 100%; }
.persona-name-field:focus { color: var(--accent); }
.persona-name-field::placeholder { color: var(--muted); font-weight: 400; }

/* Notes */
.notes-row { padding: 12px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-start; }
.notes-icon { color: var(--muted); font-size: 14px; margin-top: 6px; }
.notes-ta { flex: 1; background: transparent; border: none; color: var(--muted2); font-size: 12px; font-family: inherit; resize: none; outline: none; line-height: 1.5; }
.notes-ta::placeholder { color: var(--muted); }
.notes-ta:focus { color: var(--text); }

/* ─── MODAL ─── */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 640px; max-width: 95vw; max-height: 85vh; overflow-y: auto; }
.modal-head { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; }
.modal-body { padding: 20px 24px; }
.field-group { margin-bottom: 16px; }
.field-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.field-input, .field-ta { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; padding: 10px 12px; font-family: inherit; outline: none; transition: border-color 0.15s; }
.field-input:focus, .field-ta:focus { border-color: var(--accent); }
.field-ta { resize: vertical; line-height: 1.6; }
.modal-foot { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

/* ─── EMPTY STATE ─── */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media (max-width: 900px) {
  .body-grid { grid-template-columns: 1fr; }
  .strategy-col { border-right: none; border-bottom: 1px solid var(--border); }
  .stats-row { grid-template-columns: repeat(3, 1fr); }
  .team-pills { display: none; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <span class="logo-amp">Amplitude</span>
    <span class="logo-x">×</span>
    <span class="logo-min">Minders</span>
    <span style="color:var(--muted);font-size:12px;font-weight:400">Co-Reach NOLA · 2026</span>
  </div>
  <div class="topbar-right">
    <span class="date-chip" id="todayLabel"></span>
    <span id="cloud-status" style="font-size:11px;transition:color .3s"></span>
    <button class="btn btn-ghost" onclick="pullFromCloud()" title="Refrescar desde la nube">↺ Sync</button>
    <button class="btn btn-ghost" onclick="exportHTML()">⬇ Exportar HTML</button>
    <button class="btn btn-ghost" onclick="openNewAccount()">+ Nueva cuenta</button>
    <button class="btn btn-primary" onclick="openAddNote()">+ Nota global</button>
  </div>
</div>

<div class="stats-row">
  <div class="stat"><div class="stat-val c-acc">14</div><div class="stat-lbl">Cuentas</div></div>
  <div class="stat"><div class="stat-val c-warn" id="s-today">0</div><div class="stat-lbl">Tareas hoy</div></div>
  <div class="stat"><div class="stat-val c-danger" id="s-overdue">0</div><div class="stat-lbl">Atrasadas</div></div>
  <div class="stat"><div class="stat-val c-ok" id="s-sent">0</div><div class="stat-lbl">Enviados</div></div>
  <div class="stat"><div class="stat-val c-amp">4</div><div class="stat-lbl">Clientes Braze</div></div>
  <div class="stat"><div class="stat-val" id="s-pct" style="color:var(--muted2)">0%</div><div class="stat-lbl">Completado</div></div>
</div>

<div class="main">
  <div class="filters-bar">
    <span class="filter-lbl">Ver</span>
    <button class="fbtn on" onclick="applyFilter('all',this)">Todas</button>
    <button class="fbtn" onclick="applyFilter('today',this)">⚡ Hoy</button>
    <button class="fbtn" onclick="applyFilter('overdue',this)">🔴 Atrasadas</button>
    <button class="fbtn" onclick="applyFilter('braze',this)">🟠 Clientes Braze</button>
    <div class="filter-sep"></div>
    <span class="filter-lbl">BDR</span>
    <button class="fbtn" onclick="applyFilter('alejandro',this)">Alejandro</button>
    <button class="fbtn" onclick="applyFilter('karla',this)">Karla</button>
    <button class="fbtn" onclick="applyFilter('dani',this)">Dani</button>
    <div class="filter-sep"></div>
    <span class="filter-lbl">Amp AE</span>
    <button class="fbtn" onclick="applyFilter('renato',this)">Renato</button>
    <button class="fbtn" onclick="applyFilter('luiz',this)">Luiz</button>
    <button class="fbtn" onclick="applyFilter('gustavo',this)">Gustavo</button>
  </div>

  <div id="accountsGrid"></div>
</div>

<!-- New account modal -->
<div class="modal-bg" id="newAccModal" style="display:none" onclick="if(event.target===this)closeNewAccount()">
  <div class="modal" style="max-width:500px">
    <div class="modal-head">
      <div class="modal-title">+ Nueva cuenta</div>
      <button class="modal-close" onclick="closeNewAccount()">×</button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:12px">
      <input id="na-name" placeholder="Nombre de la empresa *" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 10px;font-family:inherit;font-size:13px">
      <div style="display:flex;gap:8px">
        <select id="na-vertical" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 10px;font-family:inherit;font-size:13px">
          <option value="banco">Banco</option>
          <option value="fintech">Fintech / Wallet</option>
          <option value="loyalty">Loyalty</option>
          <option value="aerolinea">Aerolínea</option>
          <option value="retail">Retail</option>
        </select>
        <select id="na-tier" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 10px;font-family:inherit;font-size:13px">
          <option value="T1">T1</option>
          <option value="T2">T2</option>
        </select>
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted2);cursor:pointer">
        <input type="checkbox" id="na-braze"> Cliente Braze existente
      </label>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">Equipo</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <select id="na-bdr" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 10px;font-family:inherit;font-size:12px">
          <option value="">BDR —</option>
        </select>
        <select id="na-ae" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 10px;font-family:inherit;font-size:12px">
          <option value="">AE Minders —</option>
        </select>
        <select id="na-rm" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 10px;font-family:inherit;font-size:12px">
          <option value="">RM —</option>
        </select>
        <select id="na-ampae" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 10px;font-family:inherit;font-size:12px">
          <option value="">Amp AE —</option>
        </select>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">Fecha de inicio</div>
      <input type="date" id="na-start" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 10px;font-family:inherit;font-size:13px">
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeNewAccount()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveNewAccount()">Crear cuenta</button>
    </div>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle">Editar cuenta</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveModal()">Guardar</button>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────
const TODAY = new Date('2026-06-24');
const D1 = new Date('2026-06-29');

function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtDate(d) { return d.toLocaleDateString('es-MX', {day:'2-digit', month:'short'}); }
function daysDiff(d) { return Math.round((d - TODAY)/(1000*60*60*24)); }

// ── TEAM ──────────────────────────────────────────────────
const T = {
  AP: { name:"Alejandro Porras", role:"BDR",    color:"#e67e22" },
  KR: { name:"Karla Rincón",    role:"BDR",    color:"#9b59b6" },
  BM: { name:"Belem Molina",    role:"AE",     color:"#6c63ff" },
  DH: { name:"Dani Hernández",  role:"AE",     color:"#1abc9c" },
  MB: { name:"Mati Bossie",     role:"RM",     color:"#e74c3c" },
  RL: { name:"Renato Limao",    role:"Amp AE", color:"#00c4a7" },
  LG: { name:"Luiz G. Amorim", role:"Amp AE", color:"#00c4a7" },
  GC: { name:"Gustavo Coutinho",role:"Amp AE", color:"#00c4a7" },
};

const JSONBIN_ID  = '6a3cb28af5f4af5e292cc4dd';
const JSONBIN_KEY = '$2a$10$mtzRNu78oA91gmOpGUuC8enQ/WmHiTWtq6xLMR2L9SUBe16lECdkG';

// ── STATE ─────────────────────────────────────────────────
let STATE = JSON.parse(localStorage.getItem('coreach_state') || '{}');
let _saveTimer = null;

function saveState() {
  localStorage.setItem('coreach_state', JSON.stringify(STATE));
  if (JSONBIN_ID && JSONBIN_KEY) {
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(pushToCloud, 1200); // debounce 1.2s
  }
}

async function pushToCloud() {
  try {
    await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
      body: JSON.stringify(STATE)
    });
    setCloudIndicator('saved');
  } catch(e) { setCloudIndicator('error'); }
}

async function pullFromCloud() {
  if (!JSONBIN_ID || !JSONBIN_KEY) return;
  setCloudIndicator('loading');
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`, {
      headers: { 'X-Master-Key': JSONBIN_KEY }
    });
    const data = await r.json();
    if (data.record && typeof data.record === 'object') {
      STATE = data.record;
      localStorage.setItem('coreach_state', JSON.stringify(STATE));
    }
    setCloudIndicator('ok');
  } catch(e) { setCloudIndicator('error'); }
}

function setCloudIndicator(status) {
  const el = document.getElementById('cloud-status');
  if (!el) return;
  const map = {
    loading: { text: '⟳ Sincronizando...', color: 'var(--muted)' },
    ok:      { text: '☁ En vivo',          color: 'var(--amp)'  },
    saved:   { text: '✓ Guardado',         color: 'var(--success)' },
    error:   { text: '✗ Sin conexión',     color: 'var(--danger)' },
    local:   { text: '◉ Local',            color: 'var(--muted)' },
  };
  const s = map[status] || map.local;
  el.textContent = s.text;
  el.style.color = s.color;
}

function getAcc(id) { return STATE[id] || {}; }
function setAcc(id, key, val) { if(!STATE[id]) STATE[id]={}; STATE[id][key]=val; saveState(); }
function getStart(acc) {
  const s = getAcc(acc.id);
  return s.startOverride ? new Date(s.startOverride) : acc.start;
}

// ── HELPERS ───────────────────────────────────────────────
function fmtInitials(key) {
  if(!key||!T[key]) return '';
  const parts = T[key].name.split(' ');
  return (parts[0][0]+(parts[1]?parts[1][0]:'')).toUpperCase();
}

function avatarHtml(key, label) {
  if(!key||!T[key]) return '';
  const p = T[key];
  return `<div class="avatar" title="${p.name} — ${p.role}" style="background:${p.color}">${fmtInitials(key)}</div>`;
}

function getStepStatus(accId, dayKey) {
  const s = getAcc(accId);
  if(s['sent_'+dayKey]) return 's-sent';
  const acc = ACCOUNTS.find(a=>a.id===accId);
  if(!acc) return 's-pending';
  // find step in default cadence or custom steps
  const cad = acc.isBraze ? CAD_BRAZE : CAD_FULL;
  let stepDay;
  const cadStep = cad.find(c=>c.lbl===dayKey);
  if(cadStep) {
    const ov = getStepOverride(accId, dayKey);
    stepDay = ov?.day ?? cadStep.day;
  } else {
    const custom = (s.customSteps||[]).find(c=>c.lbl===dayKey);
    if(!custom) return 's-pending';
    if(custom.date) {
      const d = daysDiff(new Date(custom.date + 'T12:00:00'));
      if(d===0) return 's-today';
      if(d<0) return 's-overdue';
      return 's-pending';
    }
    stepDay = custom.day;
  }
  const d = daysDiff(addDays(getStart(acc), stepDay-1));
  if(d===0) return 's-today';
  if(d<0) return 's-overdue';
  return 's-pending';
}

function toggleSent(accId, dayKey, el) {
  const key = 'sent_'+dayKey;
  const cur = getAcc(accId)[key];
  setAcc(accId, key, !cur);
  const newStatus = getAcc(accId)[key] ? 's-sent' : getStepStatus(accId, dayKey);
  el.className = 'step-status-dot ' + newStatus;
  updateStats();
}

function savePersona(accId, idx, val) { setAcc(accId, 'persona_'+idx, val); }
function saveNotes(accId, val) { setAcc(accId, 'notes', val); }

// ── RENDER ────────────────────────────────────────────────
function vertexClass(v) {
  const m = {banco:'tag-banco',fintech:'tag-fintech',loyalty:'tag-loyalty',aerolinea:'tag-aerolinea',retail:'tag-retail'};
  return m[v]||'tag-banco';
}

function getStepOverride(accId, stepLbl) {
  const s = getAcc(accId);
  return s['step_'+stepLbl] || null;
}

function resolveOwnerKeys(acc, owners) {
  return owners.map(o => {
    if(o==='BDR') return acc.team.bdr;
    if(o==='AE') return acc.team.ae;
    if(o==='RM') return acc.team.rm;
    if(o==='AmpAE') return acc.team.ampAe;
    return o;
  }).filter(Boolean);
}

function getStepOwnerKeys(accId, stepLbl, defaultOwners) {
  const s = getAcc(accId);
  if(s['owners_keys_' + stepLbl]) return s['owners_keys_' + stepLbl];
  const acc = ACCOUNTS.find(a=>a.id===accId);
  return resolveOwnerKeys(acc, defaultOwners);
}

function toggleOwner(accId, stepLbl, personKey, defaultOwners) {
  const s = getAcc(accId);
  // stored as person keys (AP, KR, BM, etc.)
  const acc = ACCOUNTS.find(a=>a.id===accId);
  const defaultKeys = resolveOwnerKeys(acc, defaultOwners);
  const cur = s['owners_keys_' + stepLbl] ?? [...defaultKeys];
  const idx = cur.indexOf(personKey);
  if(idx >= 0) cur.splice(idx, 1); else cur.push(personKey);
  s['owners_keys_' + stepLbl] = cur;
  STATE[accId] = s;
  saveState();
  // re-render avatars without closing picker
  const container = document.getElementById('cadence-'+accId);
  if(container) {
    const acc = ACCOUNTS.find(a=>a.id===accId);
    const sorted = getSortedSteps(acc);
    const picker = container.querySelector('.floating-picker');
    container.innerHTML = sorted.map(s=>renderStep(acc,s)).join('');
    if(picker) {
      const cards = container.querySelectorAll('.step-card');
      const idx = sorted.findIndex(s=>s.lbl===stepLbl);
      if(cards[idx]) cards[idx].appendChild(picker);
    }
  }
}

function getStepSortDate(acc, step) {
  if(step._custom) {
    if(step.date) return new Date(step.date + 'T12:00:00');
    return addDays(getStart(acc), (step.day||1) - 1);
  }
  const dayOv = getAcc(acc.id)['step_'+step.lbl]?.day ?? step.day;
  return addDays(getStart(acc), dayOv - 1);
}

function getSortedSteps(acc) {
  const cad = acc.isBraze ? CAD_BRAZE : CAD_FULL;
  const cs = (getAcc(acc.id).customSteps||[]).map(c=>({...c,css:'step-d1',_custom:true}));
  return [...cad,...cs].slice().sort((a,b) => getStepSortDate(acc,a) - getStepSortDate(acc,b));
}

function reRenderStep(accId) {
  const acc = ACCOUNTS.find(a=>a.id===accId);
  if(!acc) return;
  const container = document.getElementById('cadence-'+accId);
  if(!container) return;
  container.innerHTML = getSortedSteps(acc).map(s=>renderStep(acc,s)).join('');
}

function openOwnerPicker(accId, stepLbl, defaultOwners, el) {
  document.querySelectorAll('.owner-picker').forEach(p=>p.remove());
  const acc = ACCOUNTS.find(a=>a.id===accId);
  const curKeys = getStepOwnerKeys(accId, stepLbl, defaultOwners);
  // Show all people assigned to this account
  const accountPeople = Object.entries(acc.team)
    .map(([,key]) => key)
    .filter((k,i,a) => k && T[k] && a.indexOf(k)===i);
  const items = accountPeople.map(key => {
    const p = T[key];
    const active = curKeys.includes(key) ? 'active' : '';
    return `<div class="owner-picker-item ${active}"
      onclick="event.stopPropagation();toggleOwner('${accId}','${stepLbl}','${key}',${JSON.stringify(defaultOwners)});this.classList.toggle('active')">
      <div class="avatar" style="background:${p.color};width:18px;height:18px;font-size:7px">${fmtInitials(key)}</div>
      <span>${p.name} <span style="opacity:.5;font-size:10px">${p.role}</span></span>
    </div>`;
  }).join('');
  const picker = document.createElement('div');
  picker.className = 'owner-picker';
  picker.style.cssText = 'flex-direction:column;min-width:200px';
  picker.innerHTML = `<div style="font-size:10px;color:var(--muted);margin-bottom:4px;padding:0 4px">Recibe Slack el día que toca:</div>${items}`;
  picker.onclick = e => e.stopPropagation();
  el.closest('.step-card').appendChild(picker);
  const close = () => { picker.remove(); document.removeEventListener('click', close); };
  setTimeout(() => document.addEventListener('click', close), 10);
}

function getStepChannel(accId, stepLbl, defaultChannel) {
  return getAcc(accId)['channel_' + stepLbl] ?? defaultChannel ?? '';
}

function setStepChannel(accId, stepLbl, val) {
  const s = getAcc(accId);
  s['channel_' + stepLbl] = val;
  STATE[accId] = s;
  saveState();
  document.querySelectorAll('.floating-picker').forEach(p=>p.remove());
  reRenderStep(accId);
}

function getStepMessage(accId, stepLbl, defaultMsg) {
  return getAcc(accId)['msg_' + stepLbl] ?? defaultMsg ?? '';
}

function openEditMessage(accId, stepLbl, defaultMsg) {
  const cur = getStepMessage(accId, stepLbl, defaultMsg);
  const msg = prompt('Mensaje a enviar:', cur);
  if(msg === null) return;
  const s = getAcc(accId);
  s['msg_' + stepLbl] = msg;
  STATE[accId] = s;
  saveState();
  reRenderStep(accId);
}

const CHANNEL_ICONS = { LinkedIn:'🔵', 'LinkedIn DM':'💬', Email:'📧', WhatsApp:'🟢', Llamada:'📞' };

function openFloatingPicker(anchorEl, items, onSelect) {
  document.querySelectorAll('.floating-picker').forEach(p=>p.remove());
  const picker = document.createElement('div');
  picker.className = 'floating-picker';
  picker.style.cssText = 'position:absolute;z-index:200;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px;box-shadow:0 4px 20px rgba(0,0,0,.5);min-width:180px;';
  items.forEach(item => {
    const row = document.createElement('div');
    row.className = 'owner-picker-item' + (item.active ? ' active' : '');
    row.innerHTML = item.html;
    row.style.cursor = 'pointer';
    row.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); onSelect(item.value, row); });
    picker.appendChild(row);
  });
  picker.addEventListener('mousedown', e => e.stopPropagation());
  const card = anchorEl.closest('.step-card');
  card.style.position = 'relative';
  card.appendChild(picker);
  const close = e => {
    if(!picker.contains(e.target)) { picker.remove(); document.removeEventListener('mousedown', close); }
  };
  setTimeout(() => document.addEventListener('mousedown', close), 0);
}

function openChannelPicker(accId, stepLbl, defaultChannel, el) {
  const channels = ['LinkedIn','LinkedIn DM','Email','WhatsApp','Llamada'];
  const cur = getStepChannel(accId, stepLbl, defaultChannel);
  const items = channels.map(c => ({
    value: c, active: c === cur,
    html: `<span style="margin-right:6px">${CHANNEL_ICONS[c]||'📌'}</span>${c}`
  }));
  openFloatingPicker(el, items, val => setStepChannel(accId, stepLbl, val));
}

function openOwnerPicker(accId, stepLbl, defaultOwners, el) {
  const acc = ACCOUNTS.find(a=>a.id===accId);

// Global map so renderStep never puts JSON/quotes inside onclick attributes
const STEP_META = {};

function renderStep(acc, step) {
  const ov = step._custom ? null : getStepOverride(acc.id, step.lbl);
  const lbl = ov?.lbl || step.lbl;
  const desc = ov?.desc || step.desc;

  let stepDate;
  if(step._custom && step.date) {
    stepDate = new Date(step.date + 'T12:00:00');
  } else {
    const day = ov?.day ?? step.day;
    stepDate = addDays(getStart(acc), day - 1);
  }
  const status = getStepStatus(acc.id, step.lbl);
  const diff = daysDiff(stepDate);
  const diffStr = diff===0?'HOY':diff<0?`${Math.abs(diff)}d atrás`:`en ${diff}d`;

  const defaultOwners = step.owners || [];
  const ownerKeys = getStepOwnerKeys(acc.id, step.lbl, defaultOwners);
  const ownersHtml = ownerKeys.map(k => avatarHtml(k, '')).join('');

  const channel = getStepChannel(acc.id, step.lbl, step.channel || '');
  const channelIcon = CHANNEL_ICONS[channel] || '📌';
  const message = getStepMessage(acc.id, step.lbl, step.message || '');

  const stepIsoDate = stepDate.toISOString().split('T')[0];
  const isCustom = !!step._custom;

  // Store metadata safe from HTML attribute escaping issues
  const metaKey = acc.id + '||' + step.lbl;
  STEP_META[metaKey] = { defaultOwners, defaultChannel: step.channel || '', defaultMsg: step.message || '' };

  const removeBtn = isCustom
    ? `<span onclick="event.stopPropagation();removeCustomStep('${acc.id}','${step.lbl}')"
        style="position:absolute;top:8px;left:8px;color:var(--muted);cursor:pointer;font-size:11px;opacity:.5;line-height:1" title="Eliminar paso">✕</span>` : '';

  return `
    <div class="step-card ${step.css}" style="position:relative" data-acc="${acc.id}" data-lbl="${step.lbl}">
      ${removeBtn}
      <div class="step-status-dot ${status}"
        onclick="toggleSent('${acc.id}','${step.lbl}',this)"
        title="Clic para marcar como enviado"></div>
      <div class="step-top">
        <div style="width:100%">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
            <div class="step-day-label">${lbl}</div>
            <span onclick="event.stopPropagation();openEditStep('${acc.id}','${step.lbl}')"
              style="font-size:10px;color:var(--muted);cursor:pointer;opacity:.5" title="Editar label y descripción">✏️</span>
          </div>
          <input type="date" value="${stepIsoDate}"
            onclick="event.stopPropagation()"
            onchange="event.stopPropagation();applyStepDate('${acc.id}','${step.lbl}',this.value)"
            style="width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:5px 8px;cursor:pointer;outline:none;font-family:inherit;margin-bottom:4px">
          <div class="step-date" style="font-size:10px">${diffStr}</div>
        </div>
      </div>
      <div class="step-desc" style="margin-top:8px">${desc}</div>
      <div class="step-channel" onclick="event.stopPropagation();openChannelPickerEl(this)" title="Cambiar canal">${channelIcon} ${channel||'+ canal'}</div>
      <div class="step-message" onclick="event.stopPropagation();openEditMessageEl(this)" title="Editar mensaje">${message||'<em style="opacity:.4">+ agregar mensaje</em>'}</div>
      <div class="step-owners" style="margin-top:4px">
        ${ownersHtml}
        <div class="avatar-add" onclick="event.stopPropagation();openOwnerPickerEl(this)" title="Editar responsables">+</div>
      </div>
    </div>`;
}

function getStepCtx(el) {
  const card = el.closest('[data-acc]');
  const accId = card.dataset.acc;
  const stepLbl = card.dataset.lbl;
  const meta = STEP_META[accId + '||' + stepLbl] || {};
  return { accId, stepLbl, meta, card };
}

function openChannelPickerEl(el) {
  const { accId, stepLbl, meta } = getStepCtx(el);
  const channels = ['LinkedIn','LinkedIn DM','Email','WhatsApp','Llamada'];

  const items = channels.map(c => ({
    value: c, active: c === cur,
    html: `<span style="margin-right:6px">${CHANNEL_ICONS[c]||'📌'}</span>${c}`
  }));
  openFloatingPicker(el, items, val => setStepChannel(accId, stepLbl, val));
}

function openOwnerPickerEl(el) {
  const { accId, stepLbl, meta } = getStepCtx(el);
  openOwnerPicker(accId, stepLbl, meta.defaultOwners, el);
}

function openEditMessageEl(el) {
  const { accId, stepLbl, meta } = getStepCtx(el);

}

// ── STATS ─────────────────────────────────────────────────
function updateStats() {
  let todayN=0, overdueN=0, sentN=0, totalSteps=0;
  ACCOUNTS.forEach(acc => {
    const allSteps = getSortedSteps(acc);
    allSteps.forEach(step => {
      totalSteps++;
      const st = getStepStatus(acc.id, step.lbl);
      if(st==='s-sent') sentN++;
      else if(st==='s-today') todayN++;
      else if(st==='s-overdue') overdueN++;
    });
  });
  document.getElementById('s-today').textContent = todayN;
  document.getElementById('s-overdue').textContent = overdueN;
  document.getElementById('s-sent').textContent = sentN;
  document.getElementById('s-pct').textContent = totalSteps ? Math.round(sentN/totalSteps*100)+'%' : '0%';
}

// ── FILTER ────────────────────────────────────────────────
function applyFilter(f, btn) {
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on','on-amp'));
  btn.classList.add(f.includes('all')?'on':['renato','luiz','gustavo'].includes(f)?'on-amp':'on');

  const cad = acc => acc.isBraze ? CAD_BRAZE : CAD_FULL;

  const show = ACCOUNTS.filter(acc => {
    if(f==='all') return true;
    if(f==='today') return cad(acc).some(s=>getStepStatus(acc.id,s.lbl)==='s-today');
    if(f==='overdue') return cad(acc).some(s=>getStepStatus(acc.id,s.lbl)==='s-overdue');
    if(f==='braze') return acc.isBraze;
    if(f==='alejandro') return acc.team.bdr==='AP';
    if(f==='karla') return acc.team.bdr==='KR';
    if(f==='dani') return acc.team.ae==='DH';
    if(f==='renato') return acc.team.ampAe==='RL';
    if(f==='luiz') return acc.team.ampAe==='LG';
    if(f==='gustavo') return acc.team.ampAe==='GC';
    return true;
  });

  const grid = document.getElementById('accountsGrid');
  if(show.length===0) { grid.innerHTML='<div class="empty">No hay cuentas con ese filtro.</div>'; return; }
  grid.innerHTML = show.map(renderCard).join('');
}

function toggleCard(id) {
  document.getElementById('card-'+id)?.classList.toggle('open');
}

// ── EDIT MODAL ────────────────────────────────────────────
let _editId = null;
function openEdit(id) {
  _editId = id;
  const acc = ACCOUNTS.find(a=>a.id===id);
  const s = getAcc(id);
  document.getElementById('modalTitle').textContent = 'Editar — ' + acc.name;
  document.getElementById('modalBody').innerHTML = `
    <div class="field-group">
      <div class="field-lbl">Señal de entrada</div>
      <textarea class="field-ta" id="m-signal" rows="3">${s.signal||acc.qual.signal}</textarea>
    </div>
    <div class="field-group">
      <div class="field-lbl">Momento actual de la empresa</div>
      <textarea class="field-ta" id="m-moment" rows="3">${s.moment||acc.qual.moment}</textarea>
    </div>
    <div class="field-group">
      <div class="field-lbl">Stack visible</div>
      <textarea class="field-ta" id="m-stack" rows="2">${s.stack||acc.qual.stack}</textarea>
    </div>
    <div class="field-group">
      <div class="field-lbl">Contexto de mercado (HTML permitido)</div>
      <textarea class="field-ta" id="m-market" rows="8">${(s.market||acc.market).replace(/<p>/g,'\n').replace(/<\/p>/g,'').trim()}</textarea>
    </div>
    <div class="field-group">
      <div class="field-lbl">Asset recomendado</div>
      <input class="field-input" id="m-asset" value="${s.asset||acc.asset}">
    </div>
  `;
  document.getElementById('editModal').classList.add('open');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
  _editId = null;
}

function saveModal() {
  if(!_editId) return;
  if(_editId === '__global__') {
    STATE.__globalNote = document.getElementById('m-global-note').value;
    saveState();
    closeModal();
    showGlobalNoteBanner();
    return;
  }
  if(_editId.startsWith('__step__')) {
    const [,, accId, stepLbl] = _editId.split('__');
    const day = parseInt(document.getElementById('m-step-day').value) || 1;
    const lbl = document.getElementById('m-step-lbl').value.trim() || stepLbl;
    const desc = document.getElementById('m-step-desc').value.trim();
    const s2 = getAcc(accId);
    const customs = s2.customSteps || [];
    const ci = customs.findIndex(c=>c.lbl===stepLbl);
    if(ci >= 0) {
      customs[ci] = { lbl, day, desc };
      setAcc(accId, 'customSteps', customs);
    } else {
      setAcc(accId, 'step_'+stepLbl, { day, lbl, desc });
    }
    closeModal();
    rerenderCard(accId);
    updateStats();
    return;
  }
  const acc = ACCOUNTS.find(a=>a.id===_editId);
  setAcc(_editId, 'signal', document.getElementById('m-signal').value);
  setAcc(_editId, 'moment', document.getElementById('m-moment').value);
  setAcc(_editId, 'stack', document.getElementById('m-stack').value);
  const mkt = document.getElementById('m-market').value.trim().split(/\n\n+/).map(p=>`<p>${p}</p>`).join('\n');
  setAcc(_editId, 'market', mkt);
  setAcc(_editId, 'asset', document.getElementById('m-asset').value);
  closeModal();
  // Re-render card
  const card = document.getElementById('card-'+_editId);
  if(card) {
    const wasOpen = card.classList.contains('open');
    const newCard = document.createElement('div');
    newCard.innerHTML = renderCard(acc);
    const rendered = newCard.firstElementChild;
    if(wasOpen) rendered.classList.add('open');
    card.replaceWith(rendered);
  }
}

// ── GLOBAL NOTE ───────────────────────────────────────────
function openAddNote() {
  const cur = STATE.__globalNote || '';
  document.getElementById('modalTitle').textContent = '📝 Nota global del equipo';
  document.getElementById('modalBody').innerHTML = `
    <div class="field-group">
      <div class="field-lbl">Nota visible para todo el equipo (se guarda en este navegador)</div>
      <textarea class="field-ta" id="m-global-note" rows="10" placeholder="Ej: Acuerdo con Gustavo (Amp) de no contactar a Davivienda hasta julio. Copa Airlines — esperar confirmación de Karla antes de D4...">${cur}</textarea>
    </div>`;
  _editId = '__global__';
  document.getElementById('editModal').classList.add('open');
}

// ── DATE CHANGE ───────────────────────────────────────────
function changeStartDate(accId, val) {
  setAcc(accId, 'startOverride', val);
  rerenderCard(accId);
  updateStats();
}

// ── PERSONA MANAGEMENT ────────────────────────────────────
function addExtraPersona(accId) {
  const s = getAcc(accId);
  const extras = s.extraPersonas || [];
  extras.push({ role: 'Rol / Cargo', name: '' });
  setAcc(accId, 'extraPersonas', extras);
  rerenderPersonas(accId);
}

function removeExtraPersona(accId, idx) {
  const s = getAcc(accId);
  const extras = s.extraPersonas || [];
  extras.splice(idx, 1);
  setAcc(accId, 'extraPersonas', extras);
  rerenderPersonas(accId);
}

function saveExtraPersonaName(accId, idx, val) {
  const s = getAcc(accId);
  const extras = s.extraPersonas || [];
  if(extras[idx]) extras[idx].name = val;
  setAcc(accId, 'extraPersonas', extras);
}

function saveExtraPersonaRole(accId, idx, val) {
  const s = getAcc(accId);
  const extras = s.extraPersonas || [];
  if(extras[idx]) extras[idx].role = val;
  setAcc(accId, 'extraPersonas', extras);
}

function rerenderPersonas(accId) {
  const acc = ACCOUNTS.find(a=>a.id===accId);
  if(!acc) return;
  const s = getAcc(accId);
  const extraPersonas = s.extraPersonas || [];
  const allPersonas = [
    ...acc.personas.map((p,i)=>({ role:p.role, name:s['persona_'+i]||p.name, isDefault:true, idx:i })),
    ...extraPersonas.map((p,i)=>({ role:p.role, name:p.name, isDefault:false, idx:i })),
  ];
  const html = allPersonas.map(p => {
    const saveAttr = p.isDefault
      ? `onchange="savePersona('${accId}',${p.idx},this.value)"`
      : `onchange="saveExtraPersonaName('${accId}',${p.idx},this.value)"`;
    const removeBtn = p.isDefault ? '' :
      `<span onclick="event.stopPropagation();removeExtraPersona('${accId}',${p.idx})" style="color:var(--muted);cursor:pointer;font-size:10px;margin-left:4px;line-height:1" title="Eliminar">✕</span>`;
    const roleAttr = p.isDefault
      ? `<div class="persona-role-lbl">${p.role}</div>`
      : `<input class="persona-name-field" style="font-size:10px;color:var(--muted);margin-bottom:3px" placeholder="Rol..."
           value="${p.role}" onchange="saveExtraPersonaRole('${accId}',${p.idx},this.value)" onclick="event.stopPropagation()">`;
    return `
    <div class="persona-chip" style="position:relative">
      <div style="display:flex;align-items:center;justify-content:space-between">${roleAttr}${removeBtn}</div>
      <input class="persona-name-field" placeholder="Nombre del contacto..."
        value="${p.name}" ${saveAttr} onclick="event.stopPropagation()">
    </div>`;
  }).join('');
  const el = document.getElementById('personas-'+accId);
  if(el) el.innerHTML = html;
}

function rerenderCard(accId) {
  const acc = ACCOUNTS.find(a=>a.id===accId);
  if(!acc) return;
  const card = document.getElementById('card-'+accId);
  if(!card) return;
  const wasOpen = card.classList.contains('open');
  const tmp = document.createElement('div');
  tmp.innerHTML = renderCard(acc);
  const fresh = tmp.firstElementChild;
  if(wasOpen) fresh.classList.add('open');
  card.replaceWith(fresh);
}

// ── EXPORT ────────────────────────────────────────────────
function exportHTML() {
  const blob = new Blob([document.documentElement.outerHTML], {type:'text/html'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'amplitude-minders-coreach.html'; a.click();
}

// ── CUSTOM STEPS ──────────────────────────────────────────
function addCustomStep(accId) {
  const s = getAcc(accId);
  const customs = s.customSteps || [];
  // default date: tomorrow
  const tomorrow = new Date(TODAY);
  tomorrow.setDate(tomorrow.getDate() + 1);
  const defaultDate = tomorrow.toISOString().split('T')[0];
  customs.push({ lbl: `Push ${customs.length + 5}`, date: defaultDate, desc: 'Describí qué enviar en este paso...' });
  setAcc(accId, 'customSteps', customs);
  rerenderCard(accId);
}

function removeCustomStep(accId, lbl) {
  const s = getAcc(accId);
  const customs = (s.customSteps || []).filter(c => c.lbl !== lbl);
  setAcc(accId, 'customSteps', customs);
  rerenderCard(accId);
  updateStats();
}

// ── STEP DATE PICKER ──────────────────────────────────────
function triggerDatePicker(accId, stepLbl) {
  const input = document.getElementById(`datepicker-${accId}-${stepLbl}`);
  if(!input) return;
  input.style.position = 'static';
  input.style.opacity = '1';
  input.style.width = 'auto';
  input.style.height = 'auto';
  input.showPicker?.();
  input.focus();
  input.click();
}

function applyStepDate(accId, stepLbl, isoDate) {
  if(!isoDate) return;
  const s = getAcc(accId);
  const customs = s.customSteps || [];
  const ci = customs.findIndex(c=>c.lbl===stepLbl);
  if(ci >= 0) {
    // custom steps store absolute ISO date
    customs[ci].date = isoDate;
    delete customs[ci].day;
    setAcc(accId, 'customSteps', customs);
  } else {
    const acc = ACCOUNTS.find(a=>a.id===accId);
    const start = getStart(acc);
    const chosen = new Date(isoDate + 'T12:00:00');
    const newDay = Math.round((chosen - start)/(1000*60*60*24)) + 1;
    if(newDay < 1) return;
    const ov = getStepOverride(accId, stepLbl) || {};
    ov.day = newDay;
    setAcc(accId, 'step_'+stepLbl, ov);
  }
  rerenderCard(accId);
  updateStats();
}

// ── EDIT STEP ─────────────────────────────────────────────
function openEditStep(accId, stepLbl) {
  const acc = ACCOUNTS.find(a=>a.id===accId);
  const s = getAcc(accId);
  const cad = acc.isBraze ? CAD_BRAZE : CAD_FULL;
  // could be a default or custom step
  const defaultStep = cad.find(c=>c.lbl===stepLbl);
  const customStep = (s.customSteps||[]).find(c=>c.lbl===stepLbl);
  const step = defaultStep || customStep;
  if(!step) return;
  const ov = defaultStep ? (getStepOverride(accId, stepLbl) || {}) : {};
  const currentDay = customStep ? customStep.day : (ov.day ?? step.day);
  const currentLbl = customStep ? customStep.lbl : (ov.lbl || step.lbl);
  const currentDesc = customStep ? customStep.desc : (ov.desc || step.desc);

  document.getElementById('modalTitle').textContent = `Editar paso — ${acc.name} · ${currentLbl}`;
  document.getElementById('modalBody').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
      <div class="field-group" style="margin:0">
        <div class="field-lbl">Etiqueta (ej: D1, D3, D7)</div>
        <input class="field-input" id="m-step-lbl" value="${currentLbl}" placeholder="D1">
      </div>
      <div class="field-group" style="margin:0">
        <div class="field-lbl">Número de día desde D1</div>
        <input class="field-input" id="m-step-day" type="number" min="1" value="${currentDay}" placeholder="1">
      </div>
    </div>
    <div class="field-group">
      <div class="field-lbl">Descripción del paso</div>
      <textarea class="field-ta" id="m-step-desc" rows="5">${currentDesc}</textarea>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:4px">
      Con D1 = ${fmtDate(getStart(acc))}, este paso caería el <strong id="step-date-preview" style="color:var(--text)"></strong>
    </div>`;

  // live preview
  const previewEl = () => {
    const d = parseInt(document.getElementById('m-step-day')?.value||'1');
    const el = document.getElementById('step-date-preview');
    if(el) el.textContent = fmtDate(addDays(getStart(acc), d-1));
  };
  setTimeout(() => {
    previewEl();
    document.getElementById('m-step-day')?.addEventListener('input', previewEl);
  }, 0);

  _editId = `__step__${accId}__${stepLbl}`;
  document.getElementById('editModal').classList.add('open');
}

// ── GLOBAL NOTE BANNER ────────────────────────────────────
function showGlobalNoteBanner() {
  const note = STATE.__globalNote;
  let banner = document.getElementById('global-banner');
  if(!note) { if(banner) banner.remove(); return; }
  if(!banner) {
    banner = document.createElement('div');
    banner.id = 'global-banner';
    banner.style.cssText = 'background:rgba(108,99,255,.12);border-bottom:1px solid rgba(108,99,255,.3);padding:10px 32px;font-size:12px;color:#c4bfff;display:flex;align-items:flex-start;gap:10px;cursor:pointer;white-space:pre-wrap;line-height:1.5';
    banner.title = 'Clic para editar nota global';
    banner.onclick = openAddNote;
    document.querySelector('.stats-row').after(banner);
  }
  banner.innerHTML = `<span style="flex-shrink:0;font-size:14px">📌</span><span>${note}</span>`;
}

// ── INIT ──────────────────────────────────────────────────
document.getElementById('todayLabel').textContent = TODAY.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'});

function fullRender() {
  document.getElementById('accountsGrid').innerHTML = ACCOUNTS.map(renderCard).join('');
  updateStats();
  showGlobalNoteBanner();
}

restoreCustomAccounts();
fullRender();

// Pull cloud state then re-render
if (JSONBIN_ID && JSONBIN_KEY) {
  pullFromCloud().then(() => { restoreCustomAccounts(); fullRender(); });
} else {
  setCloudIndicator('local');
}

// Close modal on bg click
document.getElementById('editModal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

// ── NEW ACCOUNT ───────────────────────────────────────────
function openNewAccount() {
  // populate team selects
  ['na-bdr','na-ae','na-rm','na-ampae'].forEach(id => {
    const sel = document.getElementById(id);
    const base = sel.options[0].outerHTML;
    sel.innerHTML = base + Object.entries(T).map(([k,p])=>`<option value="${k}">${p.name} (${p.role})</option>`).join('');
  });
  // default start date = today
  document.getElementById('na-start').value = TODAY.toISOString().split('T')[0];
  document.getElementById('na-name').value = '';
  document.getElementById('na-braze').checked = false;
  document.getElementById('newAccModal').style.display = 'flex';
  setTimeout(() => document.getElementById('na-name').focus(), 50);
}

function closeNewAccount() {
  document.getElementById('newAccModal').style.display = 'none';
}

function saveNewAccount() {
  const name = document.getElementById('na-name').value.trim();
  if(!name) { alert('El nombre de la empresa es obligatorio'); return; }
  const vertical = document.getElementById('na-vertical').value;
  const vLabels = {banco:'Banco',fintech:'Fintech / Wallet',loyalty:'Loyalty',aerolinea:'Aerolínea',retail:'Retail'};
  const tier = document.getElementById('na-tier').value;
  const isBraze = document.getElementById('na-braze').checked;
  const startVal = document.getElementById('na-start').value || TODAY.toISOString().split('T')[0];
  const id = 'custom-' + name.toLowerCase().replace(/[^a-z0-9]/g,'-') + '-' + Date.now();

  const newAcc = {
    id, name, vertical, vLabel: vLabels[vertical]||vertical, tier, isBraze,
    team: {
      bdr: document.getElementById('na-bdr').value || null,
      ae:  document.getElementById('na-ae').value  || null,
      rm:  document.getElementById('na-rm').value  || null,
      ampAe: document.getElementById('na-ampae').value || null,
    },
    start: new Date(startVal + 'T12:00:00'),
    personas: [],
    asset: '',
    qual: { signal: '', moment: '', stack: '' },
    _custom: true,
  };

  ACCOUNTS.push(newAcc);
  // persist in state so it survives reload
  const customAccounts = (STATE._customAccounts || []);
  customAccounts.push({...newAcc, start: startVal});
  STATE._customAccounts = customAccounts;
  saveState();
  closeNewAccount();
  fullRender();
}

// restore custom accounts on load
function restoreCustomAccounts() {
  const ca = STATE._customAccounts || [];
  ca.forEach(a => {
    if(!ACCOUNTS.find(x=>x.id===a.id)) {
      ACCOUNTS.push({...a, start: new Date(a.start + 'T12:00:00')});
    }
  });
}
